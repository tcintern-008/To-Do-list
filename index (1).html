<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>To-Do List</title>
  <link rel="stylesheet" href="design.css">
</head>
<body>

  <div class="container">
    <h1>My To-Do List</h1>

   
    <div class="input-box">
      <input type="text" id="taskInput" placeholder="Add a new task...">
      <button id="addBtn">Add</button>
    </div>

    
    <div class="filters">
      <button class="filterBtn active" data-filter="all">All</button>
      <button class="filterBtn" data-filter="completed">Completed</button>
      <button class="filterBtn" data-filter="pending">Pending</button>
    </div>

    <ul id="taskList"></ul>

   
    <div class="counts">
      <span id="completedCount">Completed: 0</span>
      <span id="pendingCount">Pending: 0</span>
    </div>
  </div>

  <script src="logic.js"></script>
</body>
</html>
